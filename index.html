<!DOCTYPE html>

<!-- Note: Overhauled by Copilot -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake On LAN</title>
    <!-- CSS styles for the page layout and appearance -->
    <style>
        body {
            background-color: #292F33;
            color: #fff;
            text-align: center;
            padding: 20px;
            font-family: monospace, monospace;
        }
        h1 {
            color: #55ACEE;
            font-family: monospace, monospace;
        }
        button {
            background-color: #66757F;
            color: #fff;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            cursor: pointer;
            font-family: monospace, monospace;
            font-size: 20px;
        }
        button:hover {
            opacity: 0.95;
        }
        #message {
            margin-top: 20px;
            padding: 10px;
            min-height: 2rem;
            border-radius: 6px;
            width: calc(100% - 40px);
            max-width: 520px;
            display: inline-block;
        }
        .success {
            background-color: #4CAF50;
        }
        #buttonContainer {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            justify-items: center;
        }
    </style>
</head>
<body>
    <!-- Main heading for the page -->
    <h1>Choose a Device to Wake</h1>
    <!-- Container for the device buttons -->
    <div id="buttonContainer"></div>
    <!-- Message display area for feedback -->
    <div id="message" aria-live="polite"></div>

    <!-- JavaScript for dynamic button creation and wake request handling -->
    <script>
        // Array of devices with their IDs and labels
        const devices = [
            { id: 'PC1', label: 'PC1' },
            { id: 'PC2', label: 'PC2' },
            { id: 'PC3', label: 'PC3' },
            { id: 'PC4', label: 'PC4' },
        ];

        // Get the container element and create buttons for each device
        const container = document.getElementById('buttonContainer');
        devices.forEach(device => {
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = device.label;
            button.addEventListener('click', () => wakeDevice(device.id));
            container.appendChild(button);
        });

        // Function to set and display messages to the user
        function setMessage(text, statusClass) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = statusClass;
        }

        // Asynchronous function to send wake request to the server
        async function wakeDevice(device) {
            setMessage('Sending wake request...', '');

            try {
                // Send POST request to wake_device.php with the device parameter
                const response = await fetch('wake_device.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'device=' + encodeURIComponent(device),
                });

                const data = await response.json();
                if (response.ok && data.status === 'success') {
                    setMessage('Operation successful for ' + device + '!', 'success');
                } else {
                    setMessage('Operation failed: ' + (data.message || 'Unknown error'), 'failure');
                }
            } catch (error) {
                setMessage('Request failed: ' + error.message, 'failure');
            }
        }
    </script>
</body>
</html>
